# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    
    runs-on: ubuntu-latest
    permissions: write-all

    steps:  
    # Pull Repos
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    # Tag version
    - name: Bump version and push tag
      id: get-latest-tag
      uses: anothrNick/github-tag-action@1.64.0 # Don't use @master or @v1 unless you're happy to test the latest version
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # if you don't want to set write permissions use a PAT token
        WITH_V: true
        # VERBOSE: true
        DEFAULT_BUMP: patch
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build
    - name: Publish Server
      run: dotnet publish src/Server/Avalon.Server/Avalon.Server.csproj -c Release --no-restore

    - name: Docker Login
      uses: docker/login-action@v3.0.0
      with:
        # Username used to log against the Docker registry
        username: ${{ secrets.DOCKERUSERNAME }}
        # Password or personal access token used to log against the Docker registry
        password: ${{ secrets.DOCKERPASSWORD }}
    - name: Build and push Docker images
      # You may pin to the exact commit or the version.
      # uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
      uses: docker/build-push-action@v5.0.0
      with:
        context: src/Server/Avalon.Server/
        # Path to the Dockerfile
        file: src/Server/Avalon.Server/Dockerfile
        # Push is a shorthand for --output=type=registry
        push: ${{ github.event_name != 'pull_request' }}
        # List of tags
        tags: woozx/avalon:${{ steps.get-latest-tag.outputs.new_tag }}
