name: .NET Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.actor }}/avalon

jobs:
  build:

    runs-on: ubuntu-latest
    permissions: write-all

    steps:
    # Pull Repos
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # Tag version
    - name: Bump version and push tag
      id: get-latest-tag
      uses: anothrNick/github-tag-action@1.64.0 # Don't use @master or @v1 unless you're happy to test the latest version
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # if you don't want to set write permissions use a PAT token
        WITH_V: true
        # VERBOSE: true
        DEFAULT_BUMP: patch

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build
    - name: Publish Server
      run: dotnet publish src/Server/Avalon.Server.World/Avalon.Server.World.csproj -c Release --no-restore

    - name: Docker Login
      uses: docker/login-action@v3.0.0
      with:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        registry: ${{ env.REGISTRY }}
    - name: Extract metadata (tags, labels) for Docker
      id: meta-world
      uses: docker/metadata-action@v4.6.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/world
        tags: |
          type=schedule
          type=ref,event=branch
          type=ref,event=tag
          type=raw,latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
    - name: Build and push Docker images
      # You may pin to the exact commit or the version.
      # uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
      uses: docker/build-push-action@v5.0.0
      with:
        context: src/Server/Avalon.Server.World/
        # Path to the Dockerfile
        file: src/Server/Avalon.Server.World/Dockerfile
        # Push is a shorthand for --output=type=registry
        push: ${{ github.event_name != 'pull_request' }}
        # List of tags
        tags: ${{ steps.meta-world.outputs.tags }}
        labels: ${{ steps.meta-world.outputs.labels }}
