trigger:
- main

pool:
  #vmImage: ubuntu-latest
  #name: Azure Pipelines
  name: CI

steps:
- checkout: self
  persistCredentials: true
  submodules: true

- script: dotnet new --install MonoGame.Templates.CSharp
  displayName: 'Install .NET MonoGame Templates'

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'Run a multi-line script'

- task: DotNetCoreCLI@2
  inputs:
    command: 'restore'
    projects: '**/*.csproj'
    feedsToUse: 'select'
    vstsFeed: '5392b5e8-f3b7-4382-b047-8bb2081f4a91'
    verbosityRestore: 'Normal'
  displayName: '.NET Restore'

- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--no-restore'
  displayName: '.NET Build'

- task: DotNetCoreCLI@2
  inputs:
    command: 'test'
    arguments: '--no-build'
  displayName: '.NET Test'

- task: DotNetCoreCLI@2
  inputs:
    command: 'publish'
    arguments: 'src/Server/Avalon.Server/Avalon.Server.csproj -c Release --no-restore'
    publishWebProjects: false
    zipAfterPublish: false
    modifyOutputPath: false
  displayName: '.NET Publish Server'

- task: Docker@2
  inputs:
    containerRegistry: 'Private Registry'
    repository: 'woozx/avalon'
    command: 'buildAndPush'
    Dockerfile: 'src/Server/Avalon.Server/Dockerfile'
    buildContext: 'src/Server/Avalon.Server/'
  displayName: 'Docker Build&Publish'