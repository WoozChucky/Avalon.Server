services:
  redis:
    image: redis:latest
    container_name: redis-server
    environment:
      - REDIS_PASSWORD=123
    command: ["redis-server", "--requirepass", "123"]
    ports:
      - "6379:6379"
    restart: unless-stopped

  mariadb:
    image: mariadb:latest
    container_name: mariadb-server
    environment:
      - MARIADB_ROOT_PASSWORD=123
    ports:
      - "3306:3306"
    restart: unless-stopped