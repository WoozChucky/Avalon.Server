name: avalon

services:
  redis:
    image: redis:latest
    container_name: redis-server
    command: ["redis-server", "--requirepass", "123"]
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:latest
    container_name: postgres-server
    environment:
      - POSTGRES_PASSWORD=123
    ports:
      - "5432:5432"
    restart: unless-stopped
