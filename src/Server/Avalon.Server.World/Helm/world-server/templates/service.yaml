apiVersion: v1
kind: Service
metadata:
  name: {{ include "avalon-server.fullname" . }}
  labels:
    {{- include "avalon-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: server-tcp
      protocol: TCP
      name: server-tcp
  selector:
    {{- include "avalon-server.selectorLabels" . | nindent 4 }}
