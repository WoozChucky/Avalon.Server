server:
  infra:
    minUpdateDiff: 1
    maxCoreStuckTime: 60000
  network:
    tcp:
      enabled: true
      backlog: 128
    udp:
      enabled: false
      backlog: 128
  metrics:
    enabled: false
    apiUrl: localhost
    apiKey: apiKey
    automatic: false
    export: false
  database:
    auth:
      host: localhost
      port: 3306
      database: auth
      username: root
      password: password
    characters:
      host: localhost
      port: 3306
      database: characters
      username: root
      password: password
    world:
      host: localhost
      port: 3306
      database: world
      username: root
      password: password

replicaCount: 1

image:
  repository: avalon/game-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 21000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
